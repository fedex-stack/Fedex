<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Shipment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f1115;
    color:white;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#171a21;
    padding:30px;
    border-radius:18px;
}

h1{
    margin-bottom:25px;
    text-align:center;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#ccc;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#ff6600;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.95;
}
</style>
</head>

<body>

<div class="container">
    <h1>Create Shipment</h1>

    <div class="form-group">
        <label>Sender Name</label>
        <input id="sender">
    </div>

    <div class="form-group">
        <label>Receiver Name</label>
        <input id="receiver">
    </div>

    <div class="form-group">
        <label>Destination</label>
        <input id="destination">
    </div>

    <div class="form-group">
        <label>Current Location</label>
        <input id="location">
    </div>

    <div class="form-group">
        <label>Shipment Type</label>
        <input id="shipmentType" placeholder="Parcel / Document / Box">
    </div>

    <div class="form-group">
        <label>Weight</label>
        <input id="weight" placeholder="e.g 12kg">
    </div>

    <button id="createShipmentBtn">Create Shipment</button>
</div>

<script type="module" src="./js/admin.js"></script>

</body>
</html>
