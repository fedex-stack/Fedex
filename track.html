<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Shipment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f1115;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.live-badge{
    text-align:center;
    margin-bottom:25px;
    color:#00d26a;
    font-weight:bold;
}

.card{
    background:#171a21;
    padding:24px;
    border-radius:18px;
    margin-bottom:20px;
}

.card h2{
    margin-bottom:16px;
}

.card p{
    color:#ccc;
    margin-bottom:12px;
    line-height:1.6;
}

.timeline-item{
    padding:16px;
    border-left:3px solid #ff6600;
    margin-bottom:16px;
    background:#1b1f28;
    border-radius:10px;
}

.timeline-item h4{
    margin-bottom:8px;
}

#loading{
    text-align:center;
    color:#888;
    margin-top:50px;
}

#error{
    text-align:center;
    color:#ff7070;
    margin-top:50px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Shipment Tracking</h1>

    <div class="live-badge">● Live Tracking Active</div>

    <div id="loading">Loading shipment...</div>
    <div id="error"></div>

    <div id="shipmentView" style="display:none;">
        <div class="card">
            <h2>Shipment Details</h2>

            <p><strong>Tracking Code:</strong> <span id="trackingCode"></span></p>
            <p><strong>Status:</strong> <span id="status"></span></p>
            <p><strong>Current Location:</strong> <span id="location"></span></p>
            <p><strong>Destination:</strong> <span id="destination"></span></p>
            <p><strong>Receiver:</strong> <span id="receiver"></span></p>
        </div>

        <div class="card">
            <h2>Tracking Timeline</h2>
            <div id="timeline"></div>
        </div>
    </div>
</div>

<script type="module" src="./js/track.js"></script>

</body>
</html>
