<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Shipment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0f14;
    color:white;
    padding:14px;
}

.container{
    max-width:950px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:18px;
    color:white;
    font-size:28px;
}

.card{
    background:#171a21;
    padding:16px;
    border-radius:16px;
    margin-bottom:14px;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:0 4px 18px rgba(0,0,0,.35);
}

#loading{
    text-align:center;
    margin-top:60px;
    color:#aaa;
}

#error{
    text-align:center;
    margin-top:60px;
    color:#ff5a5a;
}

.progress-bar{
    width:100%;
    height:10px;
    background:#2b2f38;
    border-radius:20px;
    position:relative;
    margin:20px 0;
}

.progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00b35f,#00dd7b);
    border-radius:20px;
    transition:1s ease;
}

#truck{
    position:absolute;
    top:-20px;
    left:0%;
    font-size:28px;
    transition:1s ease;
    transform:scaleX(-1);
}

.status-title{
    font-size:20px;
    font-weight:bold;
}

.live-badge{
    display:flex;
    align-items:center;
    gap:12px;
    color:#00d26a;
    font-weight:bold;
}

.radar{
    width:16px;
    height:16px;
    border-radius:50%;
    background:#00d26a;
    position:relative;
}

.radar::after{
    content:"";
    position:absolute;
    inset:-8px;
    border:2px solid #00d26a;
    border-radius:50%;
    animation:pulse 1.4s infinite;
}

@keyframes pulse{
    from{
        transform:scale(1);
        opacity:1;
    }
    to{
        transform:scale(2);
        opacity:0;
    }
}

#miniMap{
    height:150px;
    border-radius:14px;
    overflow:hidden;
    position:relative;
    background:
    linear-gradient(90deg,#202634 1px,transparent 1px),
    linear-gradient(#202634 1px,transparent 1px),
    #111722;
    background-size:32px 32px;
}

.route-line{
    position:absolute;
    top:50%;
    left:12%;
    width:75%;
    height:4px;
    background:#ff6600;
}

.map-pin{
    position:absolute;
    top:45%;
    right:8%;
    font-size:24px;
}

#mapTruck{
    position:absolute;
    top:42%;
    left:12%;
    font-size:22px;
    transition:1s ease;
    transform:scaleX(-1);
}

.card h2{
    margin-bottom:14px;
    color:white;
}

.card p{
    color:#cfd6e4;
    margin-bottom:8px;
    line-height:1.5;
    font-size:14px;
}

.timeline{
    position:relative;
    padding-left:32px;
}

.timeline::before{
    content:"";
    position:absolute;
    left:9px;
    top:0;
    bottom:0;
    width:4px;
    background:#2b2f38;
}

.timeline-item{
    position:relative;
    margin-bottom:14px;
    background:#111722;
    padding:14px;
    border-radius:12px;
}

.timeline-item::before{
    content:"";
    position:absolute;
    left:-29px;
    top:20px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#00b35f;
}

.timeline-item h4{
    margin-bottom:8px;
    color:white;
}

.tick{
    color:#00b35f;
    font-size:22px;
}

small{
    color:#888;
}

.support-btn{
    position:fixed;
    bottom:25px;
    right:25px;
    width:64px;
    height:64px;
    border-radius:50%;
    border:none;
    background:#25D366;
    color:white;
    font-size:28px;
    cursor:pointer;
}

@media(max-width:600px){
    .status-title{
        font-size:18px;
    }

    #miniMap{
        height:130px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Track Shipment</h1>

    <div id="loading">Loading shipment...</div>
    <div id="error"></div>

    <div id="shipmentView" style="display:none;">

        <div class="card">
            <div class="live-badge">
                <div class="radar"></div>
                Live Tracking Active
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
                <div id="truck">🚚</div>
            </div>

            <div class="status-title" id="status"></div>
            <p>Estimated Delivery: <strong>⏳ Awaiting Confirmation</strong></p>
        </div>

        <div class="card">
            <h2>Live Route Map</h2>

            <div id="miniMap">
                <div class="route-line"></div>
                <div id="mapTruck">🚚</div>
                <div class="map-pin">📍</div>
            </div>
        </div>

        <div class="card">
            <h2>Shipment Details</h2>

            <p><strong>Tracking Code:</strong> <span id="trackingCode"></span></p>
            <p><strong>Current Location:</strong> <span id="location"></span></p>
            <p><strong>Destination:</strong> <span id="destination"></span></p>
            <p><strong>Receiver:</strong> <span id="receiver"></span></p>
            <p><strong>Sender:</strong> <span id="sender"></span></p>
            <p><strong>Sender Contact:</strong> <span id="senderPhone"></span></p>
            <p><strong>Receiver Contact:</strong> <span id="receiverPhone"></span></p>
        </div>

        <div class="card">
            <h2>Shipment Progress</h2>
            <div id="timeline" class="timeline"></div>
        </div>

    </div>
</div>

<button class="support-btn">?</button>

<script type="module" src="./js/track.js"></script>
</body>
</html>
