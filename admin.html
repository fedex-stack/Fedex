<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f1115;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:#171a21;
    gap:12px;
    flex-wrap:wrap;
}

header h1{
    font-size:24px;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

#createBtn{
    background:#ff6600;
    color:white;
}

#logoutBtn{
    background:#333;
    color:white;
}

main{
    padding:20px;
}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
}

#shipmentsContainer{
    display:grid;
    gap:20px;
}

.shipment-card{
    background:#171a21;
    padding:20px;
    border-radius:16px;
}

.shipment-card h3{
    margin-bottom:12px;
}

.shipment-card p{
    color:#ccc;
    margin-bottom:8px;
}

.card-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

.card-actions button{
    flex:1;
}

.edit-btn{
    background:#ff6600;
    color:white;
}

.copy-btn{
    background:#333;
    color:white;
}

#emptyState{
    text-align:center;
    color:#888;
    margin-top:50px;
}

#editModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:9999;
}

.modal-content{
    background:#171a21;
    width:100%;
    max-width:450px;
    padding:25px;
    border-radius:16px;
}

.modal-content h2{
    margin-bottom:20px;
}

.modal-content label{
    display:block;
    margin-bottom:8px;
}

.modal-content input,
.modal-content select{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border:none;
    border-radius:10px;
}

.modal-buttons{
    display:flex;
    gap:12px;
}

.modal-buttons button{
    flex:1;
}

#saveUpdateBtn{
    background:#ff6600;
    color:white;
}

#closeModalBtn{
    background:#333;
    color:white;
}

@media(max-width:600px){
    header{
        flex-direction:column;
        align-items:stretch;
    }

    .actions{
        width:100%;
    }

    .actions button{
        flex:1;
    }
}
</style>
</head>

<body>

<header>
    <h1>Shipment Dashboard</h1>

    <div class="actions">
        <button id="createBtn">Create Shipment</button>
        <button id="logoutBtn">Logout</button>
    </div>
</header>

<main>
    <div class="search-box">
        <input id="searchInput" placeholder="Search tracking code">
    </div>

    <div id="shipmentsContainer">
        <div id="emptyState">Loading shipments...</div>
    </div>
</main>

<div id="editModal">
    <div class="modal-content">
        <h2>Update Shipment</h2>

        <label>Status</label>
        <select id="editStatus">
            <option>Pending</option>
            <option>Picked Up</option>
            <option>Processing</option>
            <option>In Transit</option>
            <option>Out For Delivery</option>
            <option>Delivered</option>
            <option>Delayed</option>
            <option>Held</option>
            <option>Cancelled</option>
        </select>

        <label>Current Location</label>
        <input id="editLocation">

        <div class="modal-buttons">
            <button id="saveUpdateBtn">Save</button>
            <button id="closeModalBtn">Cancel</button>
        </div>
    </div>
</div>

<script type="module" src="./js/admin.js"></script>

</body>
</html>
