<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f1115;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.login-box{
    width:90%;
    max-width:420px;
    background:#171a21;
    padding:35px;
    border-radius:18px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:16px;
    margin-bottom:18px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#ff6600;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.95;
}

#errorText{
    color:#ff7070;
    margin-top:15px;
    text-align:center;
    min-height:24px;
}
</style>
</head>

<body>

<div class="login-box">
    <h1>Admin Login</h1>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Login</button>

    <p id="errorText"></p>
</div>

<script type="module">
import { loginAdmin } from "./js/auth.js";

const btn = document.getElementById("loginBtn");
const errorText = document.getElementById("errorText");

async function handleLogin(){
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    errorText.innerText = "";

    if(!username || !password){
        errorText.innerText = "Enter username and password";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Logging in...";

    try{
        await loginAdmin(username, password);
        window.location.href = "admin.html";
    }catch(error){
        errorText.innerText = "Invalid login details";
    }

    btn.disabled = false;
    btn.innerText = "Login";
}

btn.addEventListener("click", handleLogin);

document.addEventListener("keypress", (e)=>{
    if(e.key === "Enter"){
        handleLogin();
    }
});
</script>

</body>
</html>
